<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MOAV Card 10 — Daily Use</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../google-fonts.css">
  <link rel="stylesheet" href="../pretendard-variable.css">
  <link rel="stylesheet" href="../cardnews-v16.css?v=2">
</head>
<body>

  <!-- CARD 10 — DAILY / WORK -->
  <section class="card c7 dark" data-screen-label="10 Daily Use">
    <div class="brand-stamp">
      <span class="logo"><svg viewBox="0 0 24 24">
          <path fill="#fff" d="M3 4h4l5 12 5-12h4l-7 16h-4z" />
        </svg></span>
      <span class="name">MOAV</span>
    </div>
    <div class="card-idx">10 / 14</div>

    <div class="eyebrow">DAILY · WORK · RECOVERY</div>
    <h2>
      운동뿐만 아니라<br>
      <span class="hl">일상에서도,</span><br>
      매일 쓰는 관절 보호.
    </h2>
    <div class="sub">
      장시간 서서 하는 일, 쪼그려 앉는 작업, 오래된 무릎 불편감까지.<br>
      생활 속 다양한 상황에서 든든하게.
    </div>

    <div class="cards">
      <div class="usecard pri">
        <div class="idx">USE 01</div>
        <div class="ttl">오래 서거나<br>무릎을 굽히는 작업</div>
        <div class="dsc">농사·정비·청소 등<br>반복적인 무릎 부담시.</div>
      </div>
      <div class="usecard">
        <div class="idx">USE 02</div>
        <div class="ttl">일상 관절 보호</div>
        <div class="dsc">계단 오르내림,<br>장시간 보행 시.</div>
      </div>
      <div class="usecard">
        <div class="idx">USE 03</div>
        <div class="ttl">운동 후 관절 관리</div>
        <div class="dsc">마사지·지지대로<br>활용 가능한 착용감.</div>
      </div>
      <div class="usecard">
        <div class="idx">USE 04</div>
        <div class="ttl">중장년 무릎 서포트</div>
        <div class="dsc">부담 없는 착용,<br>편안한 압박감.</div>
      </div>
    </div>
  </section>

</body>
</html>
