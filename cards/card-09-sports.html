<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MOAV Card 09 — Sports In Use</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../google-fonts.css">
  <link rel="stylesheet" href="../pretendard-variable.css">
  <link rel="stylesheet" href="../cardnews-v16.css?v=2">
</head>
<body>

  <!-- CARD 09 — SPORTS IN USE (4-panel) -->
  <section class="card cD dark" data-screen-label="09 Sports In Use">
    <div class="brand-stamp">
      <span class="logo"><svg viewBox="0 0 24 24">
          <path fill="#fff" d="M3 4h4l5 12 5-12h4l-7 16h-4z" />
        </svg></span>
      <span class="name">MOAV</span>
    </div>
    <div class="card-idx">09 / 14</div>

    <div class="top">
      <div class="eyebrow">FOR EVERY MOVE</div>
      <h2>
        모든 움직임,<br>
        <span class="dim">어디에나</span> <span class="hl">함께.</span>
      </h2>
      <div class="sub">
        러닝부터 하이킹, 배드민턴, 줄넘기까지 <br>
        격한 움직임에서도 관절을 단단하게 붙잡습니다.
      </div>
    </div>

    <div class="grid">
      <div class="tile run has-img">
        <img src="../assets/러닝.png" alt="러닝">
        <div class="label">
          <div class="en">RUNNING</div>
          <div class="ko">러닝 · 트랙</div>
        </div>
      </div>
      <div class="tile hike has-img">
        <img src="../assets/등산.png" alt="등산">
        <div class="label">
          <div class="en">HIKING</div>
          <div class="ko">등산 · 트레킹</div>
        </div>
      </div>
      <div class="tile bad has-img">
        <img src="../assets/배드민턴.png" alt="배드민턴">
        <div class="label">
          <div class="en">BADMINTON</div>
          <div class="ko">배드민턴 · 구기</div>
        </div>
      </div>
      <div class="tile jump has-img">
        <img src="../assets/필라테스.png" alt="필라테스">
        <div class="label">
          <div class="en">PILATES</div>
          <div class="ko">필라테스 · 요가</div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
