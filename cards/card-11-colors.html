<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MOAV Card 11 — 3 Colors</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../google-fonts.css">
  <link rel="stylesheet" href="../pretendard-variable.css">
  <link rel="stylesheet" href="../cardnews-v16.css?v=2">
</head>
<body>

  <!-- CARD 11 — 3 COLORS -->
  <section class="card c8-v2" data-screen-label="11 Colors">
    <div class="brand-stamp">
      <span class="logo"><svg viewBox="0 0 24 24">
          <path fill="#fff" d="M3 4h4l5 12 5-12h4l-7 16h-4z" />
        </svg></span>
      <span class="name">MOAV</span>
    </div>
    <div class="card-idx">11 / 14</div>

    <div class="top">
      <div class="eyebrow">3 COLOR LINEUP</div>
      <h2>
        세 가지 컬러,<br>
        당신의 <span class="hl">스타일대로.</span>
      </h2>
      <div class="sub">
        BLACK · BLUE · GRAY &nbsp;—&nbsp; 어떤 운동복에도 잘 어울리는 컬러 구성.
      </div>
    </div>

    <div class="color-stage">
      <div class="chip">
        <div class="accent" style="background:#0A0F14"></div>
        <div class="left">
          <div class="swatch" style="background:#0A0F14"></div>
        </div>
        <div class="photo"><img src="../assets/black_prd.png" alt="black"></div>
        <div class="meta">
          <div class="nm">BLACK</div>
          <div class="cn">모던 블랙</div>
        </div>
      </div>
      <div class="chip">
        <div class="accent" style="background:var(--blue)"></div>
        <div class="left">
          <div class="swatch" style="background:var(--blue)"></div>
        </div>
        <div class="photo"><img src="../assets/blue_prd.png" alt="blue"></div>
        <div class="meta">
          <div class="nm">BLUE</div>
          <div class="cn">시그니처 블루</div>
        </div>
      </div>
      <div class="chip">
        <div class="accent" style="background:#8A94A6"></div>
        <div class="left">
          <div class="swatch" style="background:#8A94A6"></div>
        </div>
        <div class="photo"><img src="../assets/grey_prd.png" alt="grey"></div>
        <div class="meta">
          <div class="nm">GRAY</div>
          <div class="cn">뉴트럴 그레이</div>
        </div>
      </div>
    </div>

    <div class="bottom-note">
      <div>3 COLORS</div>
      <div class="r">CHOOSE YOURS</div>
    </div>
  </section>

</body>
</html>
