<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MOAV Card 12 — Pair Set</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../google-fonts.css">
  <link rel="stylesheet" href="../pretendard-variable.css">
  <link rel="stylesheet" href="../cardnews-v16.css?v=2">
</head>
<body>

  <!-- CARD 12 — 1 PAIR -->
  <section class="card c9 blue" data-screen-label="12 Pair Set">
    <div class="brand-stamp">
      <span class="logo"><svg viewBox="0 0 24 24">
          <path fill="#fff" d="M3 4h4l5 12 5-12h4l-7 16h-4z" />
        </svg></span>
      <span class="name">MOAV</span>
    </div>
    <div class="card-idx">12 / 14</div>

    <div class="eyebrow eyebrow-w">PACKAGE</div>
    <h2>
      한 번 주문으로<br>
      양쪽 무릎을<br>
      <span style="opacity:.85">모두 완성.</span>
    </h2>

    <div class="pair-img">
      <div class="chip chip-1"><img src="../assets/product-black.png" alt="MOAV"></div>
      <div class="chip chip-2"><img src="../assets/product-black.png" alt="MOAV"></div>
    </div>

    <div class="math">
      <div class="box">
        <div class="n">1</div>
        <div class="l">PAIR</div>
      </div>
      <div class="op">=</div>
      <div class="box">
        <div class="n">2</div>
        <div class="l">PIECES</div>
      </div>
    </div>

    <div class="foot">
      <div class="note">
        1쌍 = 좌·우 2개 구성
        <span class="hint">양쪽 무릎 한 번에 착용 가능</span>
      </div>
      <div class="tag">SET OF TWO</div>
    </div>
  </section>

</body>
</html>
