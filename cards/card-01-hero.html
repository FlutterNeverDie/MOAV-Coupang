<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MOAV Card 01 — Hero</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../google-fonts.css">
  <link rel="stylesheet" href="../pretendard-variable.css">
  <link rel="stylesheet" href="../cardnews-v16.css?v=2">
</head>
<body>

  <!-- CARD 01 — HERO -->
  <section class="card c1 dark" data-screen-label="01 Hero">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="brand-stamp">
      <span class="logo"><svg viewBox="0 0 24 24">
          <path fill="#fff" d="M3 4h4l5 12 5-12h4l-7 16h-4z" />
        </svg></span>
      <span class="name">MOAV</span>
    </div>
    <div class="card-idx">01 / 14</div>

    <div class="eyebrow eyebrow-en">PROFESSIONAL KNEE STRAP</div>
    <h1 class="title">
      무릎의 기준을,<br>
      <span class="hl">다시 정의</span>하다.
    </h1>
    <div class="sub">
      슬개골을 정교하게 잡아주는<br>
      프로페셔널 무릎 보호대.
    </div>

    <div class="hero-img">
      <img src="../assets/prd.png" alt="MOAV knee strap">
    </div>

    <div class="chip-l">
      <div class="k">WEIGHT</div>
      <div class="v">20 G</div>
    </div>
    <div class="chip-r">
      <div class="k">MATERIAL</div>
      <div class="v">8 MM</div>
    </div>

    <div class="kw-row">
      <div class="kw hl">SECURE</div>
      <div class="kw-divider"></div>
      <div class="kw">BREATHE</div>
      <div class="kw-divider"></div>
      <div class="kw">STRETCH</div>
      <div class="kw-divider"></div>
      <div class="kw hl">LIGHT</div>
    </div>
  </section>

</body>
</html>
