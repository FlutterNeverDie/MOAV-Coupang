<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MOAV Card 05 — Stretch</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../google-fonts.css">
  <link rel="stylesheet" href="../pretendard-variable.css">
  <link rel="stylesheet" href="../cardnews-v16.css?v=2">
</head>
<body>

  <!-- CARD 05 — STRETCH -->
  <section class="card cB dark" data-screen-label="05 Stretch">
    <div class="brand-stamp">
      <span class="logo"><svg viewBox="0 0 24 24">
          <path fill="#fff" d="M3 4h4l5 12 5-12h4l-7 16h-4z" />
        </svg></span>
      <span class="name">MOAV</span>
    </div>
    <div class="card-idx">05 / 14</div>

    <div class="eyebrow-w eyebrow">HIGH ELASTICITY</div>
    <h2>
      어떤 움직임도<br>
      <span class="hl">따라오는</span> 탄력.
    </h2>
    <div class="sub">
      강한 신축성의 프리미엄 네오프렌.<br>
      움직임에 저항하지 않고 자연스럽게 따라옵니다.
    </div>

    <div class="stretch-meter">
      <div class="lbl">RELAXED</div>
      <div class="arr">
        <svg viewBox="0 0 24 24">
          <path d="M4 11h12l-4-4 1.4-1.4L19.8 12l-6.4 6.4L12 17l4-4H4z" />
        </svg>
        <span style="font-family:'Archivo Black';font-size:11px;letter-spacing:.22em;">STRETCH</span>
        <svg viewBox="0 0 24 24">
          <path d="M4 11h12l-4-4 1.4-1.4L19.8 12l-6.4 6.4L12 17l4-4H4z" />
        </svg>
      </div>
      <div class="lbl">EXTENDED</div>
    </div>

    <div class="stretch-labels">
      <div class="tag"><span class="dot"></span>RELAX</div>
      <div class="tag r"><span class="dot"></span>EXTENDED</div>
    </div>

    <div class="stretch-stage">
      <div class="anchor">
        <svg viewBox="0 0 24 24">
          <path d="M7 5h10v2H7zM7 17h10v2H7zM11 7h2v10h-2z" />
        </svg>
      </div>
      <div class="band"></div>
      <div class="anchor">
        <svg viewBox="0 0 24 24">
          <path d="M7 5h10v2H7zM7 17h10v2H7zM11 7h2v10h-2z" />
        </svg>
      </div>
    </div>

    <div class="spec-card">
      <div class="cell">
        <div class="k">FLEX</div>
        <div class="v">자유로운<br>굽힘·펴기</div>
      </div>
      <div class="cell">
        <div class="k">RECOVERY</div>
        <div class="v">원상 복원<br>형태 유지</div>
      </div>
      <div class="cell">
        <div class="k">FIT</div>
        <div class="v">조임 없는<br>밀착감</div>
      </div>
    </div>
  </section>

</body>
</html>
