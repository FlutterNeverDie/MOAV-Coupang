<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>MOAV 무릎보호대 카드뉴스</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="google-fonts.css">
  <link rel="stylesheet" href="pretendard-variable.css">
  <link rel="stylesheet" href="cardnews-v16.css?v=2">
</head>

<body>

  <div class="top-label">MOAV · KNEE STRAP · CARD NEWS · 14 / 14</div>

  <!-- 개별 카드 파일에서 자동 로드 -->
  <div id="card-container"></div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
#export-btn .spinner {
  display: inline-block;
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
</style>

<button id="export-btn" onclick="exportPNG()" style="
  position: fixed; bottom: 30px; right: 30px; z-index: 9999;
  background: #1E5EFF; color: #fff; border: none; border-radius: 12px;
  padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; align-items: center;
">PNG 내보내기</button>

<script>
// 개별 카드 파일 목록 (순서대로)
const cardFiles = [
  'cards/card-01-hero.html',
  'cards/card-02-core-function.html',
  'cards/card-03-neoprene.html',
  'cards/card-04-breathability.html',
  'cards/card-05-stretch.html',
  'cards/card-06-velcro.html',
  'cards/card-07-ultralight.html',
  'cards/card-08-freesize.html',
  'cards/card-09-sports.html',
  'cards/card-10-daily.html',
  'cards/card-11-colors.html',
  'cards/card-12-pair.html',
  'cards/card-13-review.html',
  'cards/card-14-brand-close.html',
];

// 각 카드 HTML에서 <section class="card ..."> 부분만 추출하여 삽입
async function loadCards() {
  const container = document.getElementById('card-container');
  for (const file of cardFiles) {
    const res = await fetch(file);
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const card = doc.querySelector('.card');
    if (card) {
      // 이미지 경로를 cards/ 기준 → 루트 기준으로 변환
      card.querySelectorAll('img').forEach(img => {
        img.src = img.getAttribute('src').replace('../', '');
      });
      container.appendChild(card);
    }
  }
}

loadCards();
</script>

<script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.0/dist/dom-to-image-more.min.js"></script>
<script>
async function exportPNG() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.style.opacity = '0.85';
  btn.style.cursor = 'not-allowed';
  btn.innerHTML = '<span class="spinner"></span>다운로드 중...';

  const cards = document.querySelectorAll('.card');
  const scale = 2;
  const W = 860 * scale;
  const H = 1200 * scale;

  const final = document.createElement('canvas');
  final.width = W;
  final.height = H * cards.length;
  const ctx = final.getContext('2d');

  for (let i = 0; i < cards.length; i++) {
    btn.innerHTML = `<span class="spinner"></span>처리 중... ${i + 1} / ${cards.length}`;
    const blob = await domtoimage.toBlob(cards[i], {
      width: 860,
      height: 1200,
      style: { transform: 'none' },
      quality: 1,
      scale: scale,
    });
    const img = await createImageBitmap(blob);
    ctx.drawImage(img, 0, H * i);
  }

  const link = document.createElement('a');
  link.download = 'moav-cardnews.png';
  link.href = final.toDataURL('image/png');
  link.click();

  btn.disabled = false;
  btn.style.opacity = '';
  btn.style.cursor = 'pointer';
  btn.innerHTML = 'PNG 내보내기';
}
</script>

</body>

</html>
